<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Oh YuHwan's simple personal homepage."
    />
    <meta property="og:title" content="Oh YuHwan | Personal Homepage" />
    <meta
      property="og:description"
      content="A minimal personal homepage for Oh YuHwan."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="assets/profile.jpg" />
    <title>Oh YuHwan | Personal Homepage</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="profile-card" aria-label="Oh YuHwan profile">
        <img
          class="avatar"
          src="assets/profile.jpg"
          alt="Profile photo of Oh YuHwan"
          width="128"
          height="128"
        />
        <h1>Oh YuHwan</h1>

        <dl class="info-list">
          <div>
            <dt>Location</dt>
            <dd>Seongdong-gu, Seoul</dd>
          </div>
          <div>
            <dt>Email</dt>
            <dd>
              <a
                class="email-text"
                href="mailto:hhaugustin893@gmail.com"
                data-copy-email="hhaugustin893@gmail.com"
                aria-label="Copy email address hhaugustin893@gmail.com"
                title="Click to copy"
              >
                hhaugustin893@gmail.com
              </a>
            </dd>
          </div>
        </dl>

        <p class="copy-status" aria-live="polite" data-copy-status></p>
      </section>

      <section class="posts" aria-labelledby="posts-title">
        <h2 id="posts-title">Posts</h2>
      </section>
    </main>

    <footer class="site-footer">
      <span>&copy; <span data-current-year></span> Oh YuHwan</span>
    </footer>

    <script src="script.js" defer></script>
  </body>
</html>
