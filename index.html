<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Oh Yuhwan's simple personal homepage."
    />
    <meta property="og:title" content="Oh Yuhwan | Personal Homepage" />
    <meta
      property="og:description"
      content="A minimal personal homepage for Oh Yuhwan."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="assets/profile.jpg" />
    <title>Oh Yuhwan | Personal Homepage</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#top">Oh Yuhwan</a>
      <nav class="site-nav" aria-label="Main navigation" role="tablist">
        <button
          class="nav-button is-active"
          type="button"
          role="tab"
          data-view-target="home-panel"
          aria-controls="home-panel"
          aria-selected="true"
        >
          Home
        </button>
        <button
          class="nav-button"
          type="button"
          role="tab"
          data-view-target="info-panel"
          aria-controls="info-panel"
          aria-selected="false"
        >
          Info.
        </button>
        <button
          class="nav-button"
          type="button"
          role="tab"
          data-view-target="posts-panel"
          aria-controls="posts-panel"
          aria-selected="false"
        >
          Posts
        </button>
      </nav>
    </header>

    <main id="top" class="page-shell">
      <aside id="info" class="profile-card" aria-labelledby="profile-title">
        <img
          class="avatar"
          src="assets/profile.jpg"
          alt="Profile photo of Oh Yuhwan"
          width="128"
          height="128"
        />

        <h1 id="profile-title">Oh Yuhwan</h1>

        <dl class="info-list">
          <div>
            <dt>Location</dt>
            <dd>Seongdong-gu, Seoul</dd>
          </div>
          <div>
            <dt>Email</dt>
            <dd>
              <a
                class="email-text"
                href="mailto:hhaugustin893@gmail.com"
                data-copy-email="hhaugustin893@gmail.com"
                aria-label="Copy email address hhaugustin893@gmail.com"
                title="Click to copy"
              >
                hhaugustin893@gmail.com
              </a>
            </dd>
          </div>
        </dl>

        <p class="copy-status" aria-live="polite" data-copy-status></p>
      </aside>

      <section class="main-card" aria-label="Homepage content">
        <section
          id="home-panel"
          class="content-panel is-active"
          aria-labelledby="home-title"
          role="tabpanel"
          data-content-panel
        >
          <h2 id="home-title">Home</h2>
          <p>Welcome to my blog.</p>
          <p>
            My name is Oh Yuhwan, and I'm interested in pure mathematics.
          </p>
        </section>

        <section
          id="info-panel"
          class="content-panel"
          aria-labelledby="info-title"
          role="tabpanel"
          data-content-panel
          hidden
        >
          <h2 id="info-title">Info.</h2>
          <div class="writing-space" aria-hidden="true"></div>
        </section>

        <section
          id="posts-panel"
          class="content-panel"
          aria-labelledby="posts-title"
          role="tabpanel"
          data-content-panel
          hidden
        >
          <h2 id="posts-title">Posts</h2>
          <div class="writing-space" aria-hidden="true"></div>
        </section>
      </section>
    </main>

    <script src="script.js" defer></script>
  </body>
</html>
